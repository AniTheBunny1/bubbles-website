<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #eee; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
    .container {
      position: relative;
      margin: 0 auto;
      width: min(460px, 88vw);
      outline: 2px solid red;
    }
    .img-frame {
      position: relative;
      width: 100%;
      height: auto;
      z-index: 20;
      opacity: 0.5; /* See through */
    }
    .chat-box {
      position: absolute;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      top: 2.5%;
      left: 6.5%;
      right: 6.5%;
      bottom: 2.5%;
      border-radius: 10%;
      background-color: #111b21;
      color: white;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="public/Subject.png" class="img-frame" />
    <div class="chat-box">
      This is the black chat box. If it sticks out, I will be very confused.
    </div>
  </div>
</body>
</html>
